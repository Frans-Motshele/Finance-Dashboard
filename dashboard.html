<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dashboard</title>
        <link rel="stylesheet" href="stylesheet.css">
    </head>

    <body data-page="dashboard">
        <main class="dashboard-page">
            <header class="dashboard-header">
                <div>
                    <p>Welcome back,</p>
                    <h1 id="dashboard-username">User</h1>
                </div>
                <button type="button" id="logoutbtn">Logout</button>
            </header>

            <section class="summary">
                <div>
                    <span>Income</span>
                    <strong id="income-total">R0.00</strong>
                </div>
                <div>
                    <span>Expenses</span>
                    <strong id="expense-total">R0.00</strong>
                </div>
                <div>
                    <span>Balance</span>
                    <strong id="balance-total">R0.00</strong>
                </div>
                <div>
                    <span>This Month</span>
                    <strong id="month-total">R0.00</strong>
                </div>
            </section>

            <section class="tracker">
                <form id="transaction-form">
                    <h2>Add Transaction</h2>
                    <input id="transaction-id" type="hidden">

                    <label for="transaction-name">Name</label>
                    <input id="transaction-name" type="text" placeholder="Salary, groceries, transport" required>

                    <label for="transaction-amount">Amount</label>
                    <input id="transaction-amount" type="number" min="1" step="0.01" placeholder="0.00" required>

                    <label for="transaction-type">Type</label>
                    <select id="transaction-type" required>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>

                    <label for="transaction-category">Category</label>
                    <select id="transaction-category" required>
                        <option value="Salary">Salary</option>
                        <option value="Business">Business</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Bills">Bills</option>
                        <option value="Savings">Savings</option>
                        <option value="Other">Other</option>
                    </select>

                    <label for="transaction-date">Date</label>
                    <input id="transaction-date" type="date" required>

                    <button type="submit" id="save-transaction">Add Transaction</button>
                    <button type="button" id="cancel-edit" class="secondary-button" hidden>Cancel Edit</button>
                </form>

                <div class="transactions">
                    <div class="transactions-header">
                        <h2>Transactions</h2>
                        <button type="button" id="clear-filters" class="secondary-button">Clear Filters</button>
                    </div>

                    <div class="filters">
                        <input id="search-transactions" type="search" placeholder="Search transactions">
                        <select id="filter-type" aria-label="Filter by transaction type">
                            <option value="all">All Types</option>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                        <select id="filter-category" aria-label="Filter by category">
                            <option value="all">All Categories</option>
                            <option value="Salary">Salary</option>
                            <option value="Business">Business</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Bills">Bills</option>
                            <option value="Savings">Savings</option>
                            <option value="Other">Other</option>
                        </select>
                        <input id="filter-month" type="month" aria-label="Filter by month">
                    </div>

                    <ul id="transaction-list"></ul>
                    <p id="empty-transactions" class="empty-state">No transactions yet.</p>
                </div>
            </section>
        </main>

        <script src="script.js"></script>
    </body>
</html>
