<!doctype html>
<html lang="en">
    <head> 
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register Page</title>
        <link rel="stylesheet" href="stylesheet.css">
    </head>
    <body>
        <main>
            <div class="register">
                <h2>Finance Tracker</h2>
                <h3>Personal Information</h3>
                <form>
                    <label for="fname">First Name:</label>
                    <input id="fname" type="text" placeholder="Frans" required>
                    <label for="lname">Last Name:</label>
                    <input id="lname" type="text" placeholder="Motshele" required>
                    <label for="email">Email Address:</label>
                    <input id="email" type="email" placeholder="fransmotshele@gmail.com" required pattern=".+@gmail\.com">
                    <label for="phoneNo">Phone Number:</label>
                    <input id="phoneNo" type="tel" placeholder="123-456-7890" required>
                    <label for="dob">Date of Birth:</label>
                    <input id="dob" type="date" required>
                    <button type="submit" id="continuebtn">Continue</button>
                </form>
            </div>
        </main>

        <script src="script.js"></script>
    </body>

</html>
